document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-weight:600; font-size:22px; margin:0 0 6px;\">Class 12th / Class 10th<\u002Fh3>\n        <div style=\"color:#8a7f6d; font-size:14px;\">Central Board of Secondary Education (CBSE)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 05 CONTACT =================== -->\n  <section id=\"ak-contact\" data-ak-section=\"5\" data-screen-label=\"05 Contact\" style=\"position:relative; padding:110px 6vw 90px; max-width:1400px; margin:0 auto;\">\n    <div style=\"font-family:'Space Mono', monospace; font-size:12.5px; letter-spacing:0.2em; color:#9a8f7d; margin-bottom:34px;\"><span style=\"color:#f0913b;\">05<\u002Fspan> / CONTACT<\u002Fdiv>\n    <h2 style=\"font-family:'Bricolage Grotesque', sans-serif; font-weight:700; font-size:clamp(34px,4.6vw,64px); letter-spacing:-0.02em; margin:0 0 48px;\">Let's cut something together<\u002Fh2>\n\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1px; background:#2a251c; border:1px solid #2a251c; margin-bottom:60px;\">\n      <div style=\"background:#0e0c08; padding:24px;\"><div style=\"font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.14em; color:#6f6759; margin-bottom:10px;\">LOCATION<\u002Fdiv><div style=\"color:#f2ebdd; font-size:15px;\">Rohini Sector 4,<br>Delhi-110085<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#0e0c08; padding:24px;\"><div style=\"font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.14em; color:#6f6759; margin-bottom:10px;\">PHONE<\u002Fdiv><a href=\"tel:+918368071803\" style=\"font-size:15px;\">+91 8368071803<\u002Fa><\u002Fdiv>\n      <div style=\"background:#0e0c08; padding:24px;\"><div style=\"font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.14em; color:#6f6759; margin-bottom:10px;\">EMAIL<\u002Fdiv><a href=\"mailto:Ashuforkumar@gmail.com\" style=\"font-size:15px; word-break:break-all;\">Ashuforkumar@gmail.com<\u002Fa><\u002Fdiv>\n      <div style=\"background:#0e0c08; padding:24px;\"><div style=\"font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.14em; color:#6f6759; margin-bottom:10px;\">LINKEDIN<\u002Fdiv><a href=\"https://www.linkedin.com/in/ashu-kumar-7409ab249\" target=\"_blank\" rel=\"noopener\" style=\"font-size:15px;\">ashu-kumar-7409ab249<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- big CTA -->\n    <div style=\"position:relative; border:1px solid #3a3528; background:radial-gradient(120% 160% at 100% 0%, rgba(240,145,59,0.14), rgba(12,10,8,0) 55%), linear-gradient(#14110b,#0d0b08); padding:clamp(36px,6vw,72px); overflow:hidden;\">\n      <div style=\"position:absolute; top:20px; right:24px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.14em; color:#c8502d; display:flex; align-items:center; gap:7px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#c8502d;box-shadow:0 0 8px #c8502d;animation:akRec 1.4s infinite;\"><\u002Fspan>END OF TIMELINE<\u002Fdiv>\n      <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(40px,8vw,110px); line-height:0.9; letter-spacing:-0.03em; margin:0 0 20px;\">Roll the<br>reel.<\u002Fh3>\n      <p style=\"max-width:520px; color:#b9ad99; font-size:16px; line-height:1.6; margin:0 0 30px;\">Full edits, shorts, and AI-assisted production work live on Behance — thumbnails, pacing, and all. Available for freelance and full-time work.<\u002Fp>\n      <a href=\"https://www.behance.net/akeditz5\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'Space Mono',monospace; font-size:14px; letter-spacing:0.06em; font-weight:700; color:#0c0a08; background:#f0913b; padding:16px 30px; border-radius:2px; display:inline-flex; gap:10px; align-items:center;\">▶ VIEW FULL PORTFOLIO<\u002Fa>\n    <\u002Fdiv>\n\n    <footer style=\"margin-top:60px; padding-top:26px; border-top:1px solid #2a251c; display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.12em; color:#6f6759;\">\n      <span>© 2026 ASHU KUMAR — VIDEO &amp; MEDIA EDITOR<\u002Fspan>\n      <span style=\"color:#f0913b;\">CUT ON DELIVERY<\u002Fspan>\n    <\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- =================== TIMELINE SCRUBBER NAV =================== -->\n  <nav style=\"position:fixed; left:0; right:0; bottom:0; z-index:52; background:linear-gradient(rgba(12,10,8,0), rgba(9,7,5,0.94) 34%); padding:26px 3vw 12px; pointer-events:none;\">\n    <div style=\"max-width:1500px; margin:0 auto; pointer-events:auto;\">\n      <div style=\"display:flex; align-items:center; justify-content:space-between; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.1em; color:#8a7f6d; margin-bottom:9px;\">\n        <span id=\"ak-tc-now\" style=\"color:#f0913b;\">00:00:00:00<\u002Fspan>\n        <span>TIMELINE — ASHU KUMAR<\u002Fspan>\n        <span id=\"ak-tc-end\">00:05:00:00<\u002Fspan>\n      <\u002Fdiv>\n      <div id=\"ak-track\" style=\"position:relative; height:30px; cursor:pointer;\">\n        <!-- baseline -->\n        <div style=\"position:absolute; top:14px; left:0; right:0; height:2px; background:#2a251c;\"><\u002Fdiv>\n        <div id=\"ak-progress\" style=\"position:absolute; top:14px; left:0; width:0%; height:2px; background:linear-gradient(90deg,#c8502d,#f0913b); box-shadow:0 0 10px rgba(240,145,59,0.6);\"><\u002Fdiv>\n        <!-- ticks -->\n        <div data-ak-nav=\"0\" style=\"position:absolute; left:0%; top:0; transform:translateX(0); display:flex; flex-direction:column; align-items:flex-start; cursor:pointer;\"><span class=\"ak-tick\" style=\"width:2px; height:12px; background:#4f4838;\"><\u002Fspan><span class=\"ak-lab\" style=\"font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.08em; color:#6f6759; margin-top:5px;\">00 INTRO<\u002Fspan><\u002Fdiv>\n        <div data-ak-nav=\"1\" style=\"position:absolute; left:20%; top:0; display:flex; flex-direction:column; align-items:center; cursor:pointer;\"><span class=\"ak-tick\" style=\"width:2px; height:12px; background:#4f4838;\"><\u002Fspan><span class=\"ak-lab\" style=\"font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.08em; color:#6f6759; margin-top:5px;\">01 PROFILE<\u002Fspan><\u002Fdiv>\n        <div data-ak-nav=\"2\" style=\"position:absolute; left:40%; top:0; display:flex; flex-direction:column; align-items:center; cursor:pointer;\"><span class=\"ak-tick\" style=\"width:2px; height:12px; background:#4f4838;\"><\u002Fspan><span class=\"ak-lab\" style=\"font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.08em; color:#6f6759; margin-top:5px;\">02 CREDITS<\u002Fspan><\u002Fdiv>\n        <div data-ak-nav=\"3\" style=\"position:absolute; left:60%; top:0; display:flex; flex-direction:column; align-items:center; cursor:pointer;\"><span class=\"ak-tick\" style=\"width:2px; height:12px; background:#4f4838;\"><\u002Fspan><span class=\"ak-lab\" style=\"font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.08em; color:#6f6759; margin-top:5px;\">03 TOOLKIT<\u002Fspan><\u002Fdiv>\n        <div data-ak-nav=\"4\" style=\"position:absolute; left:80%; top:0; display:flex; flex-direction:column; align-items:center; cursor:pointer;\"><span class=\"ak-tick\" style=\"width:2px; height:12px; background:#4f4838;\"><\u002Fspan><span class=\"ak-lab\" style=\"font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.08em; color:#6f6759; margin-top:5px;\">04 ARCHIVE<\u002Fspan><\u002Fdiv>\n        <div data-ak-nav=\"5\" style=\"position:absolute; left:100%; top:0; transform:translateX(-100%); display:flex; flex-direction:column; align-items:flex-end; cursor:pointer;\"><span class=\"ak-tick\" style=\"width:2px; height:12px; background:#4f4838;\"><\u002Fspan><span class=\"ak-lab\" style=\"font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.08em; color:#6f6759; margin-top:5px;\">05 CONTACT<\u002Fspan><\u002Fdiv>\n        <!-- playhead -->\n        <div id=\"ak-playhead\" style=\"position:absolute; top:-2px; left:0%; width:2px; height:34px; background:#f2ebdd; box-shadow:0 0 8px rgba(242,235,221,0.8); pointer-events:none;\">\n          <div style=\"position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-top:8px solid #f2ebdd;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  \n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const glow = document.getElementById('ak-glow');\n    const cur = document.getElementById('ak-cursor');\n    const playhead = document.getElementById('ak-playhead');\n    const progress = document.getElementById('ak-progress');\n    const tcNow = document.getElementById('ak-tc-now');\n    const tcEnd = document.getElementById('ak-tc-end');\n    const sections = Array.from(document.querySelectorAll('[data-ak-section]'));\n    const navEls = Array.from(document.querySelectorAll('[data-ak-nav]'));\n    const track = document.getElementById('ak-track');\n\n    // ---- cursor + spotlight ----\n    let mx = window.innerWidth / 2, my = window.innerHeight / 2;\n    let gx = mx, gy = my;\n    const onMove = (e) => {\n      mx = e.clientX; my = e.clientY;\n      if (cur) cur.style.transform = `translate(${mx}px,${my}px)`;\n    };\n    window.addEventListener('mousemove', onMove, { passive: true });\n    const raf = () => {\n      gx += (mx - gx) * 0.12; gy += (my - gy) * 0.12;\n      if (glow) glow.style.transform = `translate(${gx}px,${gy}px)`;\n      this._rafId = requestAnimationFrame(raf);\n    };\n    raf();\n\n    // interactive hover grow\n    document.querySelectorAll('a, [data-ak-nav]').forEach(el => {\n      el.addEventListener('mouseenter', () => { if (cur) cur.style.transform += ' scale(1.9)'; if (glow) glow.style.opacity = '1.4'; });\n      el.addEventListener('mouseleave', () => { if (glow) glow.style.opacity = '1'; });\n    });\n\n    // ---- timecode format ----\n    const fmt = (p) => {\n      const total = 300; // 5 min timeline\n      const s = Math.max(0, Math.min(total, p * total));\n      const mm = String(Math.floor(s / 60)).padStart(2, '0');\n      const ss = String(Math.floor(s % 60)).padStart(2, '0');\n      const ff = String(Math.floor((s % 1) * 24)).padStart(2, '0');\n      return `00:${mm}:${ss}:${ff}`;\n    };\n    if (tcEnd) tcEnd.textContent = '00:05:00:00';\n\n    // ---- scroll scrub ----\n    let ticking = false;\n    const update = () => {\n      ticking = false;\n      const st = window.scrollY || window.pageYOffset;\n      const max = document.documentElement.scrollHeight - window.innerHeight;\n      const p = max > 0 ? st / max : 0;\n      if (progress) progress.style.width = (p * 100) + '%';\n      if (playhead) playhead.style.left = (p * 100) + '%';\n      if (tcNow) tcNow.textContent = fmt(p);\n\n      // active section\n      const mid = st + window.innerHeight * 0.4;\n      let active = 0;\n      sections.forEach((sec, i) => { if (sec.offsetTop <= mid) active = i; });\n      navEls.forEach(el => {\n        const idx = parseInt(el.getAttribute('data-ak-nav'), 10);\n        const tick = el.querySelector('.ak-tick');\n        const lab = el.querySelector('.ak-lab');\n        if (!tick) return; // hero CTA link has no children\n        if (idx === active) {\n          tick.style.background = '#f0913b'; tick.style.height = '16px'; tick.style.boxShadow = '0 0 8px rgba(240,145,59,0.7)';\n          if (lab) { lab.style.color = '#f2ebdd'; }\n        } else {\n          tick.style.background = '#4f4838'; tick.style.height = '12px'; tick.style.boxShadow = 'none';\n          if (lab) { lab.style.color = '#6f6759'; }\n        }\n      });\n    };\n    const onScroll = () => { if (!ticking) { ticking = true; requestAnimationFrame(update); } };\n    window.addEventListener('scroll', onScroll, { passive: true });\n    window.addEventListener('resize', update);\n    update();\n\n    // ---- nav clicks: scrub to section ----\n    const goto = (idx) => {\n      const sec = sections[idx];\n      if (!sec) return;\n      window.scrollTo({ top: sec.offsetTop, behavior: 'smooth' });\n    };\n    navEls.forEach(el => {\n      el.addEventListener('click', (e) => {\n        const idx = parseInt(el.getAttribute('data-ak-nav'), 10);\n        if (!isNaN(idx)) { e.preventDefault(); goto(idx); }\n      });\n    });\n\n    // click anywhere on track to scrub\n    if (track) {\n      track.addEventListener('click', (e) => {\n        if (e.target.closest('[data-ak-nav]')) return;\n        const r = track.getBoundingClientRect();\n        const p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));\n        const max = document.documentElement.scrollHeight - window.innerHeight;\n        window.scrollTo({ top: p * max, behavior: 'smooth' });\n      });\n    }\n\n    this._cleanup = () => {\n      window.removeEventListener('mousemove', onMove);\n      window.removeEventListener('scroll', onScroll);\n      window.removeEventListener('resize', update);\n      if (this._rafId) cancelAnimationFrame(this._rafId);\n    };\n  }\n  componentWillUnmount() { if (this._cleanup) this._cleanup(); }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
